name: "🐞 Bug Report"
description: "Report a reproducible bug or unexpected behavior in DraftDeckAI."
title: "[Bug]: "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug Report
        Thank you for helping us improve DraftDeckAI! Please provide as much detail as possible so we can squash this bug quickly.

  - type: textarea
    id: description
    attributes:
      label: "🔍 Description"
      description: "Provide a clear and concise summary of the issue."
      placeholder: "e.g., The 'Generate Resume' button throws a 500 error when clicked."
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: "🧪 Steps to Reproduce"
      description: "List the exact steps to reproduce the issue."
      placeholder: |
        1. Go to '/dashboard'
        2. Click on 'New Resume'
        3. Fill in the title as 'Test' and click submit
        4. See the error toast notification
    validations:
      required: true

  - type: textarea
    id: expected-actual
    attributes:
      label: "🎯 Expected vs. Actual Behavior"
      description: "What did you expect to happen, and what actually happened?"
      placeholder: |
        - **Expected**: The AI generation starts and redirects to the editor.
        - **Actual**: The screen freezes and a red error banner appears.
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: "💻 Environment"
      description: "Mention your OS, Browser, and Node.js version if running locally."
      placeholder: "e.g., Windows 11, Chrome 126, Node v20"
    validations:
      required: true

  - type: textarea
    id: logs-screenshots
    attributes:
      label: "🖼️ Screenshots & Console Logs"
      description: "Drag and drop screenshots, or paste any red errors from your browser's console or terminal."
      placeholder: "Paste logs here..."
    validations:
      required: false

  - type: checkboxes
    id: searched
    attributes:
      label: "✅ Duplicate Check"
      description: "Confirm you've searched the issue tracker to avoid duplicates."
      options:
        - label: "I have searched the existing issues and found no duplicates."
          required: true