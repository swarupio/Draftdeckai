name: "🚀 Feature Request"
description: "Suggest a new feature or enhancement for DraftDeckAI."
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## ✨ Feature Request
        Have an idea to make DraftDeckAI even better? We'd love to hear it! 

  - type: textarea
    id: feature-description
    attributes:
      label: "📝 Feature Description"
      description: "Clearly describe the feature or enhancement you are proposing."
      placeholder: "e.g., Add a dark mode toggle in the navbar."
    validations:
      required: true

  - type: textarea
    id: feature-justification
    attributes:
      label: "💡 Why is this feature needed?"
      description: "Explain the problem this solves or how it benefits users."
      placeholder: "Dark mode reduces eye strain and is highly requested by developers using the app at night."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "🔄 Alternatives Considered"
      description: "Are there any alternative solutions or workarounds you've thought about?"
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: "🤝 Willingness to Contribute"
      description: "Are you interested in submitting a Pull Request for this feature yourself?"
      options:
        - label: "Yes, I would like to be assigned to this issue!"
          required: false

  - type: checkboxes
    id: searched
    attributes:
      label: "✅ Duplicate Check"
      options:
        - label: "I have searched existing issues to ensure this hasn't already been requested."
          required: true